<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="theme-color" content="#333333" />

    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />

    <!-- External (not inline) so it passes the app's nonce-based CSP; runs before
         the app bundle to set the color mode and avoid a flash of the wrong theme. -->
    <script src="/theme-init.js"></script>

    %sveltekit.head%
  </head>

  <body data-sveltekit-preload-data="hover" class="">
    <div style="display: contents" class="theme-container">%sveltekit.body%</div>
  </body>
</html>
