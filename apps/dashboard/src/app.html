<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="theme-color" content="#333333" />

    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />

    <script>
      (function () {
        try {
          var storageKey = 'mode-watcher-mode';
          var explicitKey = 'mode-watcher-explicit';
          var stored = localStorage.getItem(storageKey);
          var isExplicit = localStorage.getItem(explicitKey) === 'true';
          var mode = 'light';

          if (stored === 'light' || stored === 'dark') {
            mode = stored;
          } else if (stored === 'system' && isExplicit) {
            mode = 'system';
          }

          var root = document.documentElement;
          var isLight =
            mode === 'light' ||
            (mode === 'system' && window.matchMedia('(prefers-color-scheme: light)').matches);

          if (isLight) {
            root.classList.remove('dark');
            root.style.colorScheme = 'light';
          } else {
            root.classList.add('dark');
            root.style.colorScheme = 'dark';
          }

          localStorage.setItem(storageKey, mode);
        } catch (error) {
          // Ignore storage or media-query errors in restricted environments.
        }
      })();
    </script>

    %sveltekit.head%
  </head>

  <body data-sveltekit-preload-data="hover" class="">
    <div style="display: contents" class="theme-container">%sveltekit.body%</div>
  </body>
</html>
