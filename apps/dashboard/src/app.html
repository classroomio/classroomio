<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="theme-color" content="#333333" />

    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo-32.png" />

    %sveltekit.head%
    <style id="app-loading-styles">
      #app-loading-indicator {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #fff;
        z-index: 99999;
      }
      #app-loading-indicator .spinner {
        width: 3.5rem;
        height: 3.5rem;
        color: #1d4ed8;
        animation: app-loading-spin 1s linear infinite;
      }
      @keyframes app-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
      #app-loading-indicator p {
        margin-top: 16px;
        color: #6b7280;
        font-family: system-ui, sans-serif;
      }
    </style>
  </head>

  <body data-sveltekit-preload-data="hover" class="">
    <div id="app-loading-indicator">
      <svg
        class="spinner"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        role="status"
        aria-label="Loading"
      >
        <path d="M12 2v4" />
        <path d="m16.2 7.8 2.9-2.9" />
        <path d="M18 12h4" />
        <path d="m16.2 16.2 2.9 2.9" />
        <path d="M12 18v4" />
        <path d="m4.9 19.1 2.9-2.9" />
        <path d="M2 12h4" />
        <path d="m4.9 4.9 2.9 2.9" />
      </svg>
      <p>Loading...</p>
    </div>
    <div style="display: contents" class="theme-container">%sveltekit.body%</div>
  </body>
</html>
