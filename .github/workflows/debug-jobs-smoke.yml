name: Debug Jobs Smoke

on:
  push:
    branches:
      - debug/jobs-smoke-investigation
  workflow_dispatch:

jobs:
  debug-jobs-smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: classroomio
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.19.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build jobs image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.jobs
          load: true
          tags: cio-smoke-jobs:test

      ####################################################################
      # EXPERIMENT 1
      ####################################################################

      - name: Show database tables BEFORE setup
        run: |
          docker run --rm --network host \
            postgres:16-alpine \
            psql postgresql://postgres:postgres@localhost:5432/classroomio \
            -c "\dt"

      ####################################################################
      # EXPERIMENT 2
      ####################################################################

      - name: Run db:setup
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/classroomio
          PRIVATE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/classroomio
        run: |
          pnpm --filter @cio/db db:setup
      
      - name: Verify analytics table
        run: |
          docker run --rm --network host \
            postgres:16-alpine \
            psql postgresql://postgres:postgres@localhost:5432/classroomio \
            -c "SELECT COUNT(*) FROM analytics_page_event;"

      ####################################################################
      # EXPERIMENT 3
      ####################################################################

      - name: Show database tables AFTER setup
        run: |
          docker run --rm --network host \
            postgres:16-alpine \
            psql postgresql://postgres:postgres@localhost:5432/classroomio \
            -c "\dt"

      ####################################################################
      # EXPERIMENT 4
      ####################################################################

      - name: Run jobs smoke test
        run: |
          bash docker/smoke-test.sh jobs cio-smoke-jobs:test